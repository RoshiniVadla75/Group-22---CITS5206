<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search - AI Museum</title>
  <link rel="stylesheet" href="../static/css/search.css" />
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header glass-panel">
      <div class="container nav-bar">
        <a href="home.html" class="logo-link">
          <div class="logo-circle">🧭</div>
          <div class="logo-text">
            <span class="logo-title brass-text">AI Museum</span>
            <span class="logo-subtitle">Western Australia</span>
          </div>
        </a>

        <nav class="desktop-nav" id="desktopNav"></nav>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Open menu">☰</button>
      </div>

      <nav class="mobile-nav" id="mobileNav"></nav>
    </header>

    <main class="main-content">
      <div class="container page-section search-page-shell">
        <span class="exhibit-label search-label">Museum Search</span>
        <h1 class="page-title brass-text">Search the Collection</h1>

        <section class="search-bar-card">
          <div class="search-input-wrap">
            <span class="search-icon">🔎</span>
            <input
              id="searchInput"
              type="text"
              placeholder="Search by title, keyword, category, year..."
              autocomplete="off"
            />
          </div>
        </section>

        <p id="resultCount" class="result-count hidden"></p>

        <div id="resultsContainer" class="results-container"></div>

        <section id="emptyState" class="empty-state museum-card">
          <div class="empty-icon">🔎</div>
          <p class="empty-title">Enter a search term to explore the collection</p>
          <p class="empty-text">Search across titles, topics, categories, years, and content</p>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="exhibit-label">A.I. Software Technology in Western Australia</p>
        <p class="footer-text">A Virtual Museum Experience · Final Semester Project · 2024</p>
      </div>
    </footer>
  </div>

  <script src="../static/js/topic_data.js"></script>
  <script src="../static/js/search.js"></script>
</body>
</html>
