<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Museum</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />
  </head>
  <body>
    <div class="auth-page">
      <main class="auth-main">
        <div class="auth-shell">
          <div class="auth-brand">
            <a href="{{ url_for('main.home') }}" class="logo-link">
              <div class="logo-circle">🧭</div>
            </a>
            <div class="logo-text" style="display: block">
              <span class="logo-title brass-text">AI Museum</span>
              <span class="logo-subtitle">Western Australia</span>
            </div>
          </div>

          <section class="museum-card auth-card">
            <div class="auth-icon-wrap">
              <div class="auth-icon">↪</div>
            </div>

            <h1 class="auth-title brass-text">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to explore the museum</p>

            {% with messages = get_flashed_messages(with_categories=true) %} {%
            if messages %}
            <div class="flash-list">
              {% for category, message in messages %}
              <div class="flash-message {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
            {% endif %} {% endwith %}

            <form method="POST" class="auth-form">
              <div class="auth-field">
                <label for="email">Email</label>
                <div class="auth-input-wrap">
                  <span class="auth-input-icon">✉</span>
                  <input
                    id="email"
                    class="auth-input"
                    type="email"
                    name="email"
                    value="{{ form_data.email }}"
                    placeholder="test@museum.com"
                    required
                  />
                </div>
              </div>

              <div class="auth-field">
                <label for="password">Password</label>
                <div class="auth-input-wrap">
                  <span class="auth-input-icon">🔒</span>
                  <input
                    id="password"
                    class="auth-input"
                    type="password"
                    name="password"
                    placeholder="••••••••"
                    required
                  />
                </div>
              </div>

              <button type="submit" class="auth-submit">Sign In</button>
            </form>

            <p class="auth-footer">
              Don't have an account?
              <a href="{{ url_for('main.signup') }}">Sign Up</a>
            </p>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
